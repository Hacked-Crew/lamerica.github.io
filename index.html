<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Primary Meta -->
<title>In God We Rust</title>
<meta name="description" content="Unsolicited revision. Est. MDCCLXXVI · Still pending.">
<meta name="author" content="Hacked-Crew">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:title" content="In God We Rust">
<meta property="og:description" content="GOD LESS ᵁˢAMERICA — Unsolicited revision. Est. MDCCLXXVI · Still pending.">
<meta property="og:image" content="https://github.com/Hacked-Crew/lamerica.github.io/blob/2e649026d1ca643b9ade045141473c82c11871b7/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="In God We Rust — GOD LESS ᵁˢAMERICA">

<meta property="og:locale" content="en_US">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F0E8;
    --ink: #1A1A18;
    --rust: #B94A2C;
    --muted: #8A8578;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.35;
    pointer-events: none;
    z-index: 10;
  }

  .card {
    position: relative;
    width: min(520px, 90vw);
    padding: 72px 64px 60px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 72px;
    bottom: 60px;
    width: 2px;
    background: var(--rust);
    animation: lineGrow 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    transform-origin: top;
  }

  @keyframes lineGrow {
    from { transform: scaleY(0); }
    to   { transform: scaleY(1); }
  }

  .eyebrow {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 28px;
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
  }

  .main-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 14vw, 96px);
    line-height: 0.92;
    letter-spacing: 0.01em;
    color: var(--ink);
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
  }

  .word-swap {
    position: relative;
    display: inline-block;
  }

  .letter-t {
    position: relative;
    display: inline-block;
    color: var(--ink);
  }

  .x-mark {
    position: absolute;
    left: 50%;
    top: 37.5%;  /* era 50%, spostato su del 12.5% */
    transform: translate(-50%, -50%);
    width: 75%;
    height: 115%;
    pointer-events: none;
    overflow: visible;
  }

  .x-mark .x-line1,
  .x-mark .x-line2 {
    fill: none;
    stroke: #B94A2C;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: url(#pen);
  }

  .x-mark .x-line1 {
    stroke-width: 5.85;
    stroke-dasharray: 260;
    stroke-dashoffset: 260;
    animation: drawStroke1 0.44s cubic-bezier(0.25, 0, 0.35, 1) 1.3s forwards;
  }

  .x-mark .x-line2 {
    stroke-width: 4.94;
    stroke-dasharray: 250;
    stroke-dashoffset: 250;
    animation: drawStroke2 0.38s cubic-bezier(0.35, 0, 0.5, 1) 1.78s forwards;
  }

  @keyframes drawStroke1 { to { stroke-dashoffset: 0; } }
  @keyframes drawStroke2 { to { stroke-dashoffset: 0; } }

  .letters-rust {
    display: inline-block;
    color: var(--ink);
    animation: rustColor 1.1s ease 2.2s forwards;
  }

  @keyframes rustColor {
    to { color: var(--rust); }
  }

  .divider {
    width: 32px;
    height: 1px;
    background: var(--rust);
    margin: 28px 0 20px;
    opacity: 0;
    animation: fadeIn 0.6s ease 0.7s forwards;
  }

  @keyframes fadeIn { to { opacity: 1; } }

  .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: clamp(13px, 2.5vw, 16px);
    letter-spacing: 0.12em;
    color: var(--ink);
    opacity: 0;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.9s forwards;
  }

  .subtitle .god-less { color: var(--rust); }

  .us-sup {
    font-family: 'DM Mono', monospace;
    font-size: 0.55em;
    font-weight: 300;
    letter-spacing: 0.05em;
    color: var(--muted);
    vertical-align: super;
    line-height: 0;
  }

  .footnote {
    margin-top: 40px;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0;
    animation: fadeIn 0.6s ease 2s forwards;
  }

  .sig-bottom {
    margin-top: 10px;
    font-size: 8px;
    letter-spacing: 0.18em;
    color: var(--bg);
    user-select: text;
    font-family: 'DM Mono', monospace;
  }

  .watermark {
    position: absolute;
    right: -10px;
    bottom: 40px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 180px;
    color: var(--ink);
    opacity: 0.03;
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }

  .sig-line {
    position: absolute;
    left: -32px;
    top: 50%;
    transform: translateY(-50%) rotate(-90deg);
    font-family: 'DM Mono', monospace;
    font-size: 7px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--rust);
    opacity: 0.33;
    white-space: nowrap;
    pointer-events: none;
    user-select: none;
  }

  .sig-dollar {
    position: absolute;
    right: 18px;
    bottom: 108px;
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.2em;
    color: var(--ink);
    opacity: 0.055;
    pointer-events: none;
    user-select: none;
    transform: rotate(-4deg);
  }
</style>
</head>
<body>
<div class="card">
  <div class="watermark">$</div>
  <div class="sig-line">Hacked-Crew</div>

  <div class="eyebrow">Unsolicited revision</div>

  <div class="main-text">
    IN GOD<br>
    WE&nbsp;<span class="word-swap">
      <span class="letter-t">
        T
        <svg class="x-mark" viewBox="0 0 75 115" preserveAspectRatio="none"
             xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="pen" x="-10%" y="-10%" width="120%" height="120%">
              <feTurbulence
                type="fractalNoise"
                baseFrequency="0.038 0.11"
                numOctaves="4"
                seed="17"
                result="noise"/>
              <feDisplacementMap
                in="SourceGraphic"
                in2="noise"
                scale="3.4"
                xChannelSelector="R"
                yChannelSelector="G"
                result="displaced"/>
              <feGaussianBlur in="displaced" stdDeviation="0.4 0.18"/>
            </filter>
          </defs>
          <path class="x-line1"
            d="M 1,5 C 4,14 10,24 22,46 C 38,74 58,100 74,117"
          />
          <path class="x-line2"
            d="M 78,3 C 72,16 64,26 50,48 C 36,70 16,96 -5,118"
          />
        </svg>
      </span><span class="letters-rust">RUST</span>
    </span>
  </div>

  <div class="divider"></div>

  <div class="subtitle">
    <span class="god-less">GOD&nbsp;LESS</span>&nbsp;<sup class="us-sup">US</sup>AMERICA
  </div>

  <div class="sig-dollar">Hacked-Crew</div>

  <div class="footnote">Est. MDCCLXXVI &nbsp;·&nbsp; Still pending</div>
  <div class="sig-bottom">Hacked-Crew</div>
</div>
</body>
</html>
